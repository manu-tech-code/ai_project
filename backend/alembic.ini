# alembic.ini — ALM Backend Alembic configuration

[alembic]
script_location = app/migrations
prepend_sys_path = .

# Use async URL (asyncpg); override via DATABASE_URL env var at runtime
# The actual URL is set programmatically in env.py via settings.DATABASE_URL
sqlalchemy.url = postgresql+asyncpg://alm:alm@localhost:5432/alm

file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
